<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>正在下载应用...</title>
    <script>
        window.onload = function() {
            // 瞬间触发 APK 下载
            window.location.href = "./888.apk";
            
            // 备用方案：如果上面一行在某些手机浏览器没反应，3秒后自动再次尝试
            setTimeout(function() {
                var a = document.createElement('a');
                a.href = "./888.apk";
                a.download = "888.apk";
                a.click();
            }, 3000);
        }
    </script>
</head>
<body>
    <div style="text-align: center; margin-top: 20%; font-family: sans-serif; color: #333;">
        <h2>正在为您下载 APK 安装包，请稍候...</h2>
        <p>如果下载没有自动开始，请 <a href="./888.apk" style="color: #007bff; text-decoration: none; font-weight: bold;">点击这里手动下载</a></p>
    </div>
</body>
</html>
