<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>复兴国际</title>
    <style>
        /* 全局样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 页面整体样式 */
        body {
            min-height: 100vh;
            background-image: url('unnamed.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            font-family: "Microsoft YaHei", "Heiti SC", sans-serif;
            background-color: #000; 
        }

        /* 链接容器 */
        .link-container {
            position: relative;
            z-index: 2;
            text-align: center;
            background-color: rgba(0, 0, 0, 0.6); /* 稍微加深遮罩，对比度更高 */
            padding: 25px 45px;
            border-radius: 15px;
            border: 2px solid rgba(255, 215, 0, 0.4); /* 更亮一点的金边 */
            backdrop-filter: blur(10px);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
        }

        /* 核心修改：靓丽亮金色链接样式 */
        .link-item {
            display: block;
            font-size: 28px; /* 稍微调大一点 */
            font-weight: 900; /* 使用极致加粗 */
            text-decoration: none;
            margin: 20px 0;
            padding: 5px 10px;
            transition: all 0.3s ease;

            /* 修改为极其靓丽的高光金渐变 */
            background: linear-gradient(to bottom, #fff3a0 0%, #ffcf40 50%, #ffbf00 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;

            /* 关键修改：增加金色发光和黑色描边，防止看不清 */
            text-shadow: 
                0px 0px 8px rgba(255, 215, 0, 0.5), /* 金色光晕 */
                2px 2px 2px rgba(0, 0, 0, 1);        /* 纯黑深阴影，把字扣出来 */
        }

        /* 鼠标悬停效果：更闪耀 */
        .link-item:hover {
            transform: scale(1.1);
            /* 悬停时变为纯白色光芒感 */
            background: linear-gradient(to bottom, #ffffff 0%, #fff3a0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 12px rgba(255, 255, 255, 0.8));
        }

        /* 响应式适配 */
        @media (max-width: 768px) {
            .link-item {
                font-size: 24px;
                margin: 18px 0;
            }
            .link-container {
                padding: 20px 30px;
                width: 85%;
            }
        }
    </style>
</head>
<body>
    <div class="link-container">
        <a href="https://m518.mos077.com/" class="link-item">皇冠会员入口1</a>
        <a href="https://m473.mos077.com/" class="link-item">皇冠会员入口2</a>
        <a href="https://mos066.com/f" class="link-item">皇冠会员入口3</a>
        <a href="https://ag.hga030.com/" class="link-item">皇冠代理入口1</a>
        <a href="https://ag.hga030.com/" class="link-item">皇冠代理入口2</a>
        <a href="https://ag.hga030.com/" class="link-item">皇冠代理入口3</a>
    </div>
</body>
</html>
